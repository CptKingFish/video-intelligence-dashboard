# Local stack: the Next.js app + TimescaleDB (time-series) + Postgres
# (relational stand-in for Neon during local dev). For production, point
# DATABASE_URL at your Neon connection string and drop the `db` service.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
    ports:
      - "3000:3000"
    environment:
      # Runtime (server-only) secrets.
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-postgres://videointel:videointel@db:5432/videointel}
      TIMESCALE_URL: ${TIMESCALE_URL:-postgres://videointel:videointel@timescale:5432/videointel_ts}
      EMBEDDING_SERVICE_URL: ${EMBEDDING_SERVICE_URL:-}
    depends_on:
      db:
        condition: service_healthy
      timescale:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: videointel
      POSTGRES_PASSWORD: videointel
      POSTGRES_DB: videointel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videointel"]
      interval: 5s
      timeout: 5s
      retries: 5

  timescale:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: videointel
      POSTGRES_PASSWORD: videointel
      POSTGRES_DB: videointel_ts
    ports:
      - "5433:5432"
    volumes:
      - tsdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videointel"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  tsdata:
